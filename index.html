<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VibeCheck</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>🎧 rhythm </h1>
        <p>Transform Spotify playlists into DJ experiences.</p>

        <button id="spotifyBtn"> Connect Spotify </button>

        <div id="status">
            Not Connected
        </div>
        <input
            id="playlistInput"
            placeholder="Spotify Playlist ID"/>
        <button id="loadPlaylistBtn">Load Playlist</button>
        <div id="playlistTracks">
            <ul id="songList"></ul>
        </div>
        <h2>Queue</h2>
        <ul id="queueList"></ul>
        <button id="startSessionBtn">
            Start Session
        </button>
        <!-- <button id="queueBtn">Queue</button> -->
    </div>

    <script src="renderer.js"></script>
</body>
</html>
